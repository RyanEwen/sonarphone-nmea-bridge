# Refresh status + the range chip label independently of sonar frames.
interval:
  - interval: 1s
    then:
      # only push label text that actually changed (each update invalidates
      # and re-renders the label region)
      - if:
          condition:
            lambda: |-
              static std::string last;
              std::string cur = id(sonar).demo() ? "DEMO"
                  : (id(sonar).is_connected() ? "" : "no signal");
              if (cur == last) return false;
              last = cur;
              return true;
          then:
            - lvgl.label.update:
                id: lbl_range
                text: !lambda |-
                  if (id(sonar).demo()) return std::string("DEMO");
                  return std::string(id(sonar).is_connected() ? "" : "no signal");
      - if:
          condition:
            lambda: |-
              static std::string last;
              std::string cur = id(sonar).range_label();
              if (cur == last) return false;
              last = cur;
              return true;
          then:
            - lvgl.label.update:
                id: lbl_auto
                text: !lambda return id(sonar).range_label();
      - if:
          condition:
            lambda: return id(sonar).wifi_scan_fresh();
          then:
            - lambda: |-
                lv_dropdown_set_options(id(dd_sonar_ap)->obj,
                                        id(sonar).wifi_scan_options().c_str());
      # collapse the zoom controls after ~8 s untouched
      - lambda: |-
          auto *m = (lv_obj_t *) id(btn_minus);
          if (!lv_obj_has_flag(m, LV_OBJ_FLAG_HIDDEN) &&
              (int) millis() - id(g_zoom_last) > 8000) {
            lv_obj_add_flag(m, LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag((lv_obj_t *) id(btn_auto), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag((lv_obj_t *) id(btn_plus), LV_OBJ_FLAG_HIDDEN);
          }

# --- UI ---------------------------------------------------------------------
lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touchscreen
  # PARTIAL mode + forked mipi_rgb: full-frame flushes (waterfall) swap
  # framebuffers tear-free; small flushes (labels) write both fbs directly.
  # Label updates cost ~2 ms instead of a full-frame render + copy.
  buffer_size: 100%
  full_refresh: false
  bg_opa: TRANSP
  pages:
    # ======================================================= sonar page
    - id: main_page
      bg_opa: TRANSP
      widgets:
        # waterfall canvas: first widget = bottom layer; C++ writes its buffer
        - canvas:
            id: waterfall_cv
            x: 0
            y: 0
            width: 800
            height: 480
        # depth/temp/battery readout (top-left): no box — white text with a
        # 4-way black outline (shadow copies at +/-3px in each direction)
        - obj:
            x: 10
            y: 10
            width: 260
            height: 150
            bg_opa: TRANSP
            border_width: 0
            pad_all: 4
            scrollbar_mode: "OFF"
            scrollable: false
            widgets:
              - label:
                  id: lbl_depth_sh1
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_48
                  align: TOP_LEFT
                  x: -3
                  y: 0
              - label:
                  id: lbl_depth_sh2
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_48
                  align: TOP_LEFT
                  x: 3
                  y: 0
              - label:
                  id: lbl_depth_sh3
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_48
                  align: TOP_LEFT
                  x: 0
                  y: -3
              - label:
                  id: lbl_depth_sh4
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_48
                  align: TOP_LEFT
                  x: 0
                  y: 3
              - label:
                  id: lbl_depth
                  text: "--"
                  text_color: 0xFFFFFF
                  text_font: montserrat_48
                  align: TOP_LEFT
                  x: 0
                  y: 0
              - label:
                  id: lbl_temp_sh1
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_28
                  align: BOTTOM_LEFT
                  x: -3
                  y: -38
              - label:
                  id: lbl_temp_sh2
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_28
                  align: BOTTOM_LEFT
                  x: 3
                  y: -38
              - label:
                  id: lbl_temp_sh3
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_28
                  align: BOTTOM_LEFT
                  x: 0
                  y: -41
              - label:
                  id: lbl_temp_sh4
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_28
                  align: BOTTOM_LEFT
                  x: 0
                  y: -35
              - label:
                  id: lbl_temp
                  text: "--"
                  text_color: 0xE8F2FF
                  text_font: montserrat_28
                  align: BOTTOM_LEFT
                  x: 0
                  y: -38
              - label:
                  id: lbl_batt_sh1
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_24
                  align: BOTTOM_LEFT
                  x: -3
                  y: 0
              - label:
                  id: lbl_batt_sh2
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_24
                  align: BOTTOM_LEFT
                  x: 3
                  y: 0
              - label:
                  id: lbl_batt_sh3
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_24
                  align: BOTTOM_LEFT
                  x: 0
                  y: -3
              - label:
                  id: lbl_batt_sh4
                  text: "--"
                  text_color: 0x000000
                  text_font: montserrat_24
                  align: BOTTOM_LEFT
                  x: 0
                  y: 3
              - label:
                  id: lbl_batt
                  text: "--"
                  text_color: 0xE8F2FF
                  text_font: montserrat_24
                  align: BOTTOM_LEFT
                  x: 0
                  y: 0
        # status (top, left of the settings button)
        - label:
            id: lbl_range
            text: "no signal"
            text_color: 0xFFB340
            text_font: montserrat_20
            align: TOP_RIGHT
            x: -40
            y: 16
        # bottom-left controls: [gear] [zoom] \u2192 zoom expands - / AUTO / +
        # to the right; they auto-collapse after ~8 s untouched
        - button:
            id: btn_settings
            align: BOTTOM_LEFT
            x: 14
            y: -14
            width: 64
            height: 52
            widgets:
              - label:
                  text: "\uF013"
                  align: CENTER
                  text_font: montserrat_28
            on_click:
              - lvgl.page.show: settings_page
        - button:
            id: btn_zoom
            align: BOTTOM_LEFT
            x: 86
            y: -14
            width: 64
            height: 52
            widgets:
              - label:
                  text: "\U000F0349"
                  align: CENTER
                  text_font: mdi_28
            on_click:
              - lambda: |-
                  auto *m = (lv_obj_t *) id(btn_minus);
                  auto *a = (lv_obj_t *) id(btn_auto);
                  auto *p = (lv_obj_t *) id(btn_plus);
                  if (lv_obj_has_flag(m, LV_OBJ_FLAG_HIDDEN)) {
                    lv_obj_clear_flag(m, LV_OBJ_FLAG_HIDDEN);
                    lv_obj_clear_flag(a, LV_OBJ_FLAG_HIDDEN);
                    lv_obj_clear_flag(p, LV_OBJ_FLAG_HIDDEN);
                    id(g_zoom_last) = (int) millis();
                  } else {
                    lv_obj_add_flag(m, LV_OBJ_FLAG_HIDDEN);
                    lv_obj_add_flag(a, LV_OBJ_FLAG_HIDDEN);
                    lv_obj_add_flag(p, LV_OBJ_FLAG_HIDDEN);
                  }
        - button:
            id: btn_minus
            hidden: true
            align: BOTTOM_LEFT
            x: 158
            y: -14
            width: 64
            height: 52
            widgets:
              - label:
                  text: "-"
                  align: CENTER
                  text_font: montserrat_28
            on_click:
              - lambda: |-
                  id(sonar).range_down();
                  id(g_zoom_last) = (int) millis();
        - button:
            id: btn_auto
            hidden: true
            align: BOTTOM_LEFT
            x: 230
            y: -14
            width: 130
            height: 52
            widgets:
              - label:
                  id: lbl_auto
                  text: "AUTO"
                  align: CENTER
                  text_font: montserrat_20
            on_click:
              - lambda: |-
                  id(sonar).range_auto();
                  id(g_zoom_last) = (int) millis();
        - button:
            id: btn_plus
            hidden: true
            align: BOTTOM_LEFT
            x: 368
            y: -14
            width: 64
            height: 52
            widgets:
              - label:
                  text: "+"
                  align: CENTER
                  text_font: montserrat_28
            on_click:
              - lambda: |-
                  id(sonar).range_up();
                  id(g_zoom_last) = (int) millis();

    # ======================================================= settings page
    - id: settings_page
      bg_color: 0x101418
      bg_opa: COVER
      # sync widgets to persisted settings when the page opens (safe context
      # for lvgl actions, unlike on_boot)
      on_load:
        - lambda: id(sonar).wifi_scan_start();
        - lvgl.slider.update:
            id: sl_bright
            value: !lambda return id(g_bright);
        - lvgl.label.update:
            id: lbl_bright_val
            text: !lambda |-
              char s[8];
              snprintf(s, sizeof(s), "%d%%", id(g_bright));
              return std::string(s);
        - lvgl.dropdown.update:
            id: dd_units
            selected_index: !lambda 'return id(g_feet) ? 1 : 0;'
        - lvgl.dropdown.update:
            id: dd_tempu
            selected_index: !lambda 'return id(g_temp_f) ? 1 : 0;'
        - lvgl.dropdown.update:
            id: dd_style
            selected_index: !lambda return id(g_style);
        - lvgl.dropdown.update:
            id: dd_noise
            selected_index: !lambda return id(g_noise);
        - lvgl.dropdown.update:
            id: dd_clarity
            selected_index: !lambda return id(g_clarity);
        - lvgl.dropdown.update:
            id: dd_fish
            selected_index: !lambda return id(g_fish);
        - lvgl.dropdown.update:
            id: dd_beam
            selected_index: !lambda return id(g_beam);
        - lvgl.slider.update:
            id: sl_gain
            value: !lambda return id(g_gain);
        - lvgl.label.update:
            id: lbl_gain_val
            text: !lambda |-
              char s[8];
              snprintf(s, sizeof(s), "%d%%", id(g_gain));
              return std::string(s);
        - lvgl.widget.update:
            id: sw_demo
            state:
              checked: !lambda return id(g_demo);
      widgets:
        - label:
            text: "Settings"
            text_color: 0xFFFFFF
            text_font: montserrat_28
            x: 20
            y: 16
        - button:
            align: TOP_RIGHT
            x: -20
            y: 12
            width: 100
            height: 48
            widgets:
              - label:
                  text: "CLOSE"
                  align: CENTER
                  text_font: montserrat_20
            on_click:
              - lvgl.page.show: main_page

        # ---- column A ----
        - label:
            text: "Units"
            text_color: 0xC8DCFF
            text_font: montserrat_20
            x: 20
            y: 92
        - dropdown:
            id: dd_units
            x: 190
            y: 80
            width: 200
            options: ["Meters", "Feet"]
            on_value:
              - lambda: |-
                  id(g_feet) = (x == 1);
                  id(sonar).set_feet_runtime(x == 1);
        - label:
