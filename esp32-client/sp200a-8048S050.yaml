# First flash: DEMO mode, stays on home WiFi (reachable / OTA-recoverable).
# Proves the whole firmware + LVGL + waterfall stack on real hardware without
# ever joining the sonar AP.

substitutions:
  name: sonarphone

esphome:
  name: ${name}
  on_boot:
    # Plain C++ only. NEVER put lvgl.*.update actions here — LVGL actions from
    # boot context wedge the main loop before it starts (hard-learned).
    # Widget sync happens in settings_page on_load instead.
    - priority: -100
      then:
        - lambda: |-
            id(sonar).set_canvas((lv_obj_t *) id(waterfall_cv));
            id(sonar).set_feet_runtime(id(g_feet));
            id(sonar).set_style(id(g_style));
            id(sonar).set_noise_filter(id(g_noise));
            id(sonar).set_surface_clarity(id(g_clarity));
            id(sonar).set_fish_markers(id(g_fish));
            id(sonar).set_beam_runtime(id(g_beam) == 1 ? 0x02 : 0x08);
            id(sonar).set_gain(id(g_gain) / 100.0f);
            id(sonar).set_demo_runtime(id(g_demo));
        - light.turn_on:
            id: backlight
            brightness: !lambda return id(g_bright) / 100.0f;

packages:
  device: github://RyanEwen/esphome-lvgl/devices/ESP32-8048S050.yaml@main

external_components:
  - source:
      type: local
      path: components

# Override the device package's rotation:90 (LVGL requires rotation to be unset
# on the display). Landscape 800x480 suits the horizontally-scrolling waterfall.
display:
  - id: !extend main_display
    rotation: 0

# The package's GT911 transform (swap_xy + mirror_y) was calibrated for the
# portrait rotation above; in native landscape the controller already matches
# the panel, so undo it.
touchscreen:
  - id: !extend main_touchscreen
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

logger:
  level: INFO

# Material Design Icons subset (LVGL's built-in FontAwesome set has no
# magnifier); fetched at compile time
font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_28
    size: 28
    bpp: 4
    glyphs: ["\U000F0349"]  # magnify

# --- Persisted settings (survive reboot; applied in on_boot) ----------------
globals:
  - id: g_feet
    type: bool
    restore_value: true
    initial_value: 'true'
  - id: g_temp_f
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: g_style
    type: int
    restore_value: true
    initial_value: '0'
  - id: g_noise
    type: int
    restore_value: true
    initial_value: '0'
  - id: g_clarity
    type: int
    restore_value: true
    initial_value: '0'
  - id: g_fish
    type: int
    restore_value: true
    initial_value: '1'
  - id: g_beam
    type: int
    restore_value: true
    initial_value: '0'
  - id: g_gain
    type: int
    restore_value: true
    initial_value: '100'
  - id: g_demo
    type: bool
    restore_value: true
    initial_value: 'true'
  - id: g_bright
    type: int
    restore_value: true
    initial_value: '100'
  # last touch on the zoom controls (millis); drives auto-collapse
  - id: g_zoom_last
    type: int
    restore_value: false
    initial_value: '0'

# --- Networking -------------------------------------------------------------
# CRITICAL: the sonar AP has no internet and no ESPHome API. Without
# reboot_timeout: 0s the node reboots after ~15 min on the water. Do not omit.
wifi:
  ssid: "The Three R's IoT"
  password: !secret wifi_iot_password
  reboot_timeout: 0s
  # AP declared here so ESPHome creates the netif + DHCP glue; the sp200a
  # component keeps it enabled ALONGSIDE the STA link (ESPHome alone would
  # only use it as a fallback)
  ap:
    ssid: "SonarDisplay"
    password: "12345678"

api:
  reboot_timeout: 0s

# No OTA password — matches the existing common.yaml convention (the running
# firmware has none, and adding one now would break the next dashboard flash).
ota:
  - platform: esphome

web_server:
  port: 80

# --- Sonar client + sensors -------------------------------------------------
sp200a:
  id: sonar
  demo: true
  feet: false
  depth:
    id: sonar_depth
    name: "Depth"
    on_value:
      - lvgl.label.update:
          id: lbl_depth
          text: !lambda |-
            char s[16];
            if (id(sonar).feet()) {
              double tf = x * 3.28084;
              int ft = (int) tf;
              int in = (int) ((tf - ft) * 12.0 + 0.5);
              if (in == 12) { ft++; in = 0; }
              snprintf(s, sizeof(s), "%d' %d\"", ft, in);
            } else {
              snprintf(s, sizeof(s), "%.2f m", x);
            }
            return s;
      - lvgl.label.update:
