            char s[16];
            if (id(g_temp_f))
              snprintf(s, sizeof(s), "%.0f\xC2\xB0""F", x * 9.0 / 5.0 + 32.0);
            else
              snprintf(s, sizeof(s), "%.0f\xC2\xB0""C", x);
            return s;
      - lvgl.label.update:
          id: lbl_temp_sh1
          text: !lambda |-
            char s[16];
            if (id(g_temp_f))
              snprintf(s, sizeof(s), "%.0f\xC2\xB0""F", x * 9.0 / 5.0 + 32.0);
            else
